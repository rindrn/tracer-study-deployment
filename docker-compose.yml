version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: tracer-postgres
    restart: always
    environment:
      POSTGRES_DB: tracer_study
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: tracer-backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    env_file:
      - .env.production

  frontend:
    build:
      context: ./frontend
    container_name: tracer-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

  cube:
    build:
      context: ./cube/tracer-analytics
    container_name: tracer-cube
    restart: always
    depends_on:
      - postgres
    ports:
      - "4000:4000"

volumes:
  postgres_data:
